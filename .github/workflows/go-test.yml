name: Go Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache: true

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.60.3

      - name: Update PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Run lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache: true

      - name: Run unit tests
        run: go test ./...
